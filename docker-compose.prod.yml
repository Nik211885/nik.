services:

  postgres:
    image: postgres:17-alpine
    container_name: nik_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nik_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: nik185/nik-backend:latest
    container_name: nik_backend
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:        http://+:5055
      ConnectionStrings__Postgres: >-
        Server=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
        Pooling=true;MinPoolSize=0;MaxPoolSize=100;Timeout=15;
      Jwt__SecretKey:                    ${JWT_SECRET_KEY}
      Jwt__Issuer:                       ${JWT_ISSUER}
      Jwt__Audience:                     ${JWT_AUDIENCE}
      Jwt__AccessTokenExpirationMinutes: ${JWT_ACCESS_EXPIRY_MINUTES}
      Jwt__RefreshTokenExpirationDays:   ${JWT_REFRESH_EXPIRY_DAYS}
      CORS_ORIGINS:                      ${CORS_ORIGINS}
      Cloudinary__UrlUpload:             ${CLOUDINARY_URL_UPLOAD}
      Cloudinary__CloudName:             ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey:                ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret:             ${CLOUDINARY_API_SECRET}
      Cloudinary__UploadFolder:          ${CLOUDINARY_UPLOAD_FOLDER}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nik_net

  frontend:
    image: nik185/nik-frontend:latest
    container_name: nik_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:4000"
    environment:
      PORT: 4000
      BACKEND_URL: "http://backend:5055"
    depends_on:
      - backend
    networks:
      - nik_net

  # ── Monitoring ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nik_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - nik_net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nik_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - nik_net

  loki:
    image: grafana/loki:3.1.0
    container_name: nik_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - nik_net

  promtail:
    image: grafana/promtail:3.1.0
    container_name: nik_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - nik_net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  nik_net:
    driver: bridge
