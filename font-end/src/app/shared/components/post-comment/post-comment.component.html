<div class="vcard bio">
  <img [src]="comment.authorAvatar || defaultAvatar" [alt]="comment.authorName">
</div>
<div class="comment-body">
  <h3>{{ comment.authorName }}</h3>
  <div class="meta">{{ comment.createdDate | appDate: 'detail' }}</div>
  <p>{{ comment.text }}</p>
  <p><a (click)="replyClicked.emit(comment)" class="reply" style="cursor:pointer">{{ ApplicationTitle.REPLY | language }}</a></p>
</div>

@if (comment.children && comment.children.length > 0) {
  <ul class="children">
    @for (child of comment.children; track child.id) {
      <li app-post-comment [comment]="child" (replyClicked)="replyClicked.emit($event)"></li>
    }
  </ul>
}
