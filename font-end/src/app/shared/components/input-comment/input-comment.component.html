<div class="comment-form-wrap pt-5">
  <h3 class="mb-5">{{ApplicationTitle.LEAVE_COMMENT | language}}</h3>
  <form action="#" class="p-3 p-md-5 bg-light">
    <div class="form-group">
      <label for="name">{{ApplicationTitle.YOUR_NAME}} *</label>
      <input type="text" class="form-control" id="name">
    </div>
    <div class="form-group">
      <label for="email">{{ApplicationTitle.YOUR_EMAIL}} *</label>
      <input type="email" class="form-control" id="email">
    </div>
    <div class="form-group">
      <label for="website">{{ApplicationTitle.WEBSITE}}</label>
      <input type="url" class="form-control" id="website">
    </div>

    <div class="form-group">
      <label for="message">{{ApplicationTitle.MESSAGE}}</label>
      <textarea name="" id="message" cols="30" rows="10" class="form-control"></textarea>
    </div>
    <div class="form-group">
      <input type="submit" value="{{ApplicationTitle.POST_COMMENT | language}}" class="btn py-3 px-4 btn-primary">
    </div>

  </form>
</div>
