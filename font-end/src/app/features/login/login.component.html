<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo mb-3">
        <i class="bi bi-person-circle"></i>
      </div>
      <h4 class="fw-bold mb-1">{{ AdminMessage.LOGIN_TITLE | language }}</h4>
      <p class="text-muted small">{{ AdminMessage.LOGIN_SUBTITLE | language }}</p>
    </div>

    @if (error) {
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-circle-fill"></i>
      {{ error | language }}
    </div>
    }

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ AdminMessage.LOGIN_EMAIL_LABEL | language }}</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input
            type="text"
            class="form-control"
            [placeholder]="AdminMessage.LOGIN_EMAIL_PLACEHOLDER | language"
            [(ngModel)]="form.emailOrUserName"
            name="emailOrUserName"
            required
            autocomplete="username">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">{{ AdminMessage.LOGIN_PASSWORD_LABEL | language }}</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            [placeholder]="AdminMessage.LOGIN_PASSWORD_PLACEHOLDER | language"
            [(ngModel)]="form.password"
            name="password"
            required
            autocomplete="current-password">
          <button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword" tabindex="-1">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-dark w-100 py-2 fw-semibold"
        [disabled]="loading || !form.emailOrUserName || !form.password">
        @if (loading) {<span class="spinner-border spinner-border-sm me-2" role="status"></span>}
        @if (!loading) {<i class="bi bi-box-arrow-in-right me-2"></i>}
        {{ (loading ? AdminMessage.LOGIN_SUBMITTING : AdminMessage.LOGIN_SUBMIT) | language }}
      </button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i>{{ AdminMessage.LOGIN_BACK | language }}
      </a>
    </div>
  </div>
</div>
