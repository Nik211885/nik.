<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h4 class="fw-bold mb-1">{{ AdminMessage.COMMENTS_PAGE_TITLE | language }}</h4>
    <p class="text-muted mb-0 small">{{ AdminMessage.COMMENTS_SUBTITLE | language }}</p>
  </div>
</div>

<div class="admin-card mb-3">
  <div class="d-flex gap-2">
    <input class="form-control" [(ngModel)]="articleId"
      [placeholder]="AdminMessage.COMMENTS_SEARCH_PLACEHOLDER | language"
      style="max-width:340px">
    <button class="btn btn-dark" (click)="search()" [disabled]="!articleId.trim() || loading">
      <i class="bi bi-search me-1"></i>{{ AdminMessage.COMMENTS_SEARCH_BTN | language }}
    </button>
  </div>
</div>

<div class="admin-card">
  <app-admin-table [columns]="columns" [data]="items" [loading]="loading"
    [showActions]="true" (deleteClick)="openDelete($event)">
  </app-admin-table>
</div>

<app-admin-confirm-modal [show]="showConfirm" [itemName]="(selected?.text ?? '') | slice:0:40"
  (confirmed)="delete()" (cancelled)="showConfirm=false"></app-admin-confirm-modal>
