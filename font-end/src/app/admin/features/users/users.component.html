<div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h4 class="fw-bold mb-1">{{ AdminMessage.USERS_PAGE_TITLE | language }}</h4>
    <p class="text-muted mb-0 small">{{ AdminMessage.USERS_SUBTITLE | language }}</p>
  </div>
</div>
<div class="admin-card">
  <app-admin-table [columns]="columns" [data]="items" [loading]="loading"
    [hideDelete]="true" (editClick)="openEdit($event)">
  </app-admin-table>
</div>

@if (showModal) {
<div class="admin-overlay" (click)="showModal=false">
  <div class="admin-modal" (click)="$event.stopPropagation()">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-semibold mb-0">{{ AdminMessage.USERS_MODAL_EDIT | language }}</h5>
      <button type="button" class="btn btn-sm btn-light rounded-circle p-1 lh-1" (click)="showModal=false"><i class="bi bi-x-lg"></i></button>
    </div>
    @if (error) {
    <div class="alert alert-danger small">{{ error | language }}</div>
    }
    <form (ngSubmit)="save()">
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ AdminMessage.USERS_FORM_USERNAME | language }} <span class="text-danger">*</span></label>
        <input class="form-control" [(ngModel)]="form.userName" name="userName" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ AdminMessage.USERS_FORM_EMAIL | language }}</label>
        <input class="form-control" [(ngModel)]="form.email" name="email" type="email">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ AdminMessage.USERS_FORM_PHONE | language }}</label>
        <input class="form-control" [(ngModel)]="form.phone" name="phone">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ AdminMessage.USERS_FORM_BIO | language }}</label>
        <textarea class="form-control" [(ngModel)]="form.bio" name="bio" rows="3"></textarea>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-outline-secondary flex-fill" (click)="showModal=false">{{ AdminMessage.CANCEL | language }}</button>
        <button type="submit" class="btn btn-dark flex-fill" [disabled]="saving">
          @if (saving) {<span class="spinner-border spinner-border-sm me-2"></span>}
          {{ (saving ? AdminMessage.SAVING : AdminMessage.SAVE) | language }}
        </button>
      </div>
    </form>
  </div>
</div>
}
